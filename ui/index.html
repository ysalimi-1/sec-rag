<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDGAR RAG</title>
    <meta name="description" content="SEC EDGAR filing analysis with RAG">
    <link rel="stylesheet" href="styles.css?v=8">
</head>

        <aside id="sidebar">
